version: v2
managed:
  enabled: true
plugins:
  - local:
      - go
      - run
      - google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
    out: internal/gen
    opt: paths=source_relative
  - local:
      - go
      - run
      - connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.19.1
    out: internal/gen
    opt: paths=source_relative
  - local:
      - npx
      - --yes
      - "@bufbuild/protoc-gen-es@2.11.0"
    out: web/src/gen
    opt: target=ts
