version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/sqlc/schema.sql"
    queries: "internal/db/sqlc/query.sql"
    gen:
      go:
        package: "sqlite"
        out: "internal/db/sqlc/sqlite"
        sql_package: "database/sql"
  - engine: "postgresql"
    schema: "internal/db/sqlc/schema.sql"
    queries: "internal/db/sqlc/query.sql"
    gen:
      go:
        package: "postgresql"
        out: "internal/db/sqlc/postgresql"
        sql_package: "database/sql"
