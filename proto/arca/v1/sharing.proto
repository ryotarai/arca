syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service SharingService {
  rpc GetMachineSharing(GetMachineSharingRequest) returns (GetMachineSharingResponse);
  rpc UpdateMachineSharing(UpdateMachineSharingRequest) returns (UpdateMachineSharingResponse);
}

message MachineSharingMember {
  string user_id = 1;
  string email = 2;
  string role = 3;
}

message GeneralAccess {
  string scope = 1;
  string role = 2;
}

message GetMachineSharingRequest {
  string machine_id = 1;
}

message GetMachineSharingResponse {
  repeated MachineSharingMember members = 1;
  GeneralAccess general_access = 2;
}

message UpdateMachineSharingRequest {
  string machine_id = 1;
  repeated MachineSharingMember members = 2;
  GeneralAccess general_access = 3;
}

message UpdateMachineSharingResponse {
  repeated MachineSharingMember members = 1;
  GeneralAccess general_access = 2;
}
