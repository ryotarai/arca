syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service MachineProfileService {
  rpc ListMachineProfiles(ListMachineProfilesRequest) returns (ListMachineProfilesResponse);
  rpc ListAvailableProfiles(ListAvailableProfilesRequest) returns (ListAvailableProfilesResponse);
  rpc CreateMachineProfile(CreateMachineProfileRequest) returns (CreateMachineProfileResponse);
  rpc UpdateMachineProfile(UpdateMachineProfileRequest) returns (UpdateMachineProfileResponse);
  rpc DeleteMachineProfile(DeleteMachineProfileRequest) returns (DeleteMachineProfileResponse);
}

enum MachineProfileType {
  MACHINE_PROFILE_TYPE_UNSPECIFIED = 0;
  MACHINE_PROFILE_TYPE_LIBVIRT = 1;
  MACHINE_PROFILE_TYPE_GCE = 2;
  MACHINE_PROFILE_TYPE_LXD = 3;
}

enum MachineExposureMethod {
  MACHINE_EXPOSURE_METHOD_UNSPECIFIED = 0;
  reserved 1;
  MACHINE_EXPOSURE_METHOD_PROXY_VIA_SERVER = 2;
}

enum MachineConnectivity {
  MACHINE_CONNECTIVITY_UNSPECIFIED = 0;
  MACHINE_CONNECTIVITY_PRIVATE_IP = 1;
  MACHINE_CONNECTIVITY_PUBLIC_IP = 2;
}

message MachineExposureConfig {
  MachineExposureMethod method = 1;
  reserved 2; // was domain_prefix
  reserved 3; // was base_domain
  reserved 4, 5, 6;
  MachineConnectivity connectivity = 7;
}

message LibvirtProfileConfig {
  string uri = 1;
  string network = 2;
  string storage_pool = 3;
  string startup_script = 4;
}

message GceProfileConfig {
  string project = 1;
  string zone = 2;
  string network = 3;
  string subnetwork = 4;
  string service_account_email = 5;
  string startup_script = 6;
  reserved 7;         // was machine_type
  int64 disk_size_gb = 8;
  reserved 9;         // was image_project
  reserved 10;        // was image_family
  repeated string allowed_machine_types = 11;
}

message LxdProfileConfig {
  string endpoint = 1;
  string startup_script = 2;
}

message MachineProfileConfig {
  oneof provider {
    LibvirtProfileConfig libvirt = 1;
    GceProfileConfig gce = 2;
    LxdProfileConfig lxd = 4;
  }
  MachineExposureConfig exposure = 3;
  string server_api_url = 5;
  int64 auto_stop_timeout_seconds = 6;
  string agent_prompt = 7;
}

message MachineProfile {
  string id = 1;
  string name = 2;
  MachineProfileType type = 3;
  MachineProfileConfig config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
  string boot_config_hash = 7;
  int32 machine_count = 8;
  int32 running_machine_count = 9;
}

message ListMachineProfilesRequest {}

message ListMachineProfilesResponse {
  repeated MachineProfile profiles = 1;
}

message CreateMachineProfileRequest {
  string name = 1;
  MachineProfileType type = 2;
  MachineProfileConfig config = 3;
}

message CreateMachineProfileResponse {
  MachineProfile profile = 1;
}

message UpdateMachineProfileRequest {
  string profile_id = 1;
  string name = 2;
  MachineProfileType type = 3;
  MachineProfileConfig config = 4;
}

message UpdateMachineProfileResponse {
  MachineProfile profile = 1;
}

message DeleteMachineProfileRequest {
  string profile_id = 1;
}

message DeleteMachineProfileResponse {}

message MachineProfileSummary {
  string id = 1;
  string name = 2;
  MachineProfileType type = 3;
  repeated string allowed_machine_types = 4;
}

message ListAvailableProfilesRequest {}

message ListAvailableProfilesResponse {
  repeated MachineProfileSummary profiles = 1;
}
