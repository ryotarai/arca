syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service MachineTemplateService {
  rpc ListMachineTemplates(ListMachineTemplatesRequest) returns (ListMachineTemplatesResponse);
  rpc ListAvailableMachineTemplates(ListAvailableMachineTemplatesRequest) returns (ListAvailableMachineTemplatesResponse);
  rpc CreateMachineTemplate(CreateMachineTemplateRequest) returns (CreateMachineTemplateResponse);
  rpc UpdateMachineTemplate(UpdateMachineTemplateRequest) returns (UpdateMachineTemplateResponse);
  rpc DeleteMachineTemplate(DeleteMachineTemplateRequest) returns (DeleteMachineTemplateResponse);
}

enum MachineTemplateType {
  MACHINE_TEMPLATE_TYPE_UNSPECIFIED = 0;
  MACHINE_TEMPLATE_TYPE_LIBVIRT = 1;
  MACHINE_TEMPLATE_TYPE_GCE = 2;
  MACHINE_TEMPLATE_TYPE_LXD = 3;
}

enum MachineExposureMethod {
  MACHINE_EXPOSURE_METHOD_UNSPECIFIED = 0;
  reserved 1;
  MACHINE_EXPOSURE_METHOD_PROXY_VIA_SERVER = 2;
}

enum MachineConnectivity {
  MACHINE_CONNECTIVITY_UNSPECIFIED = 0;
  MACHINE_CONNECTIVITY_PRIVATE_IP = 1;
  MACHINE_CONNECTIVITY_PUBLIC_IP = 2;
}

message MachineExposureConfig {
  MachineExposureMethod method = 1;
  string domain_prefix = 2;
  string base_domain = 3;
  reserved 4, 5, 6;
  MachineConnectivity connectivity = 7;
}

message LibvirtTemplateConfig {
  string uri = 1;
  string network = 2;
  string storage_pool = 3;
  string startup_script = 4;
}

message GceTemplateConfig {
  string project = 1;
  string zone = 2;
  string network = 3;
  string subnetwork = 4;
  string service_account_email = 5;
  string startup_script = 6;
  reserved 7;         // was machine_type
  int64 disk_size_gb = 8;
  reserved 9;         // was image_project
  reserved 10;        // was image_family
  repeated string allowed_machine_types = 11;
}

message LxdTemplateConfig {
  string endpoint = 1;
  string startup_script = 2;
}

message MachineTemplateConfig {
  oneof provider {
    LibvirtTemplateConfig libvirt = 1;
    GceTemplateConfig gce = 2;
    LxdTemplateConfig lxd = 4;
  }
  MachineExposureConfig exposure = 3;
  string server_api_url = 5;
  int64 auto_stop_timeout_seconds = 6;
}

message MachineTemplate {
  string id = 1;
  string name = 2;
  MachineTemplateType type = 3;
  MachineTemplateConfig config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message ListMachineTemplatesRequest {}

message ListMachineTemplatesResponse {
  repeated MachineTemplate templates = 1;
}

message CreateMachineTemplateRequest {
  string name = 1;
  MachineTemplateType type = 2;
  MachineTemplateConfig config = 3;
}

message CreateMachineTemplateResponse {
  MachineTemplate template = 1;
}

message UpdateMachineTemplateRequest {
  string template_id = 1;
  string name = 2;
  MachineTemplateType type = 3;
  MachineTemplateConfig config = 4;
}

message UpdateMachineTemplateResponse {
  MachineTemplate template = 1;
}

message DeleteMachineTemplateRequest {
  string template_id = 1;
}

message DeleteMachineTemplateResponse {}

message MachineTemplateSummary {
  string id = 1;
  string name = 2;
  MachineTemplateType type = 3;
  repeated string allowed_machine_types = 4;
}

message ListAvailableMachineTemplatesRequest {}

message ListAvailableMachineTemplatesResponse {
  repeated MachineTemplateSummary templates = 1;
}
