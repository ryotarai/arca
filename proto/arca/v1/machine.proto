syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service MachineService {
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);
  rpc GetMachine(GetMachineRequest) returns (GetMachineResponse);
  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse);
  rpc UpdateMachine(UpdateMachineRequest) returns (UpdateMachineResponse);
  rpc StartMachine(StartMachineRequest) returns (StartMachineResponse);
  rpc StopMachine(StopMachineRequest) returns (StopMachineResponse);
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse);
  rpc ListMachineEvents(ListMachineEventsRequest) returns (ListMachineEventsResponse);
}

message Machine {
  string id = 1;
  string name = 2;
  string status = 3;
  string desired_status = 4;
  string last_error = 5;
  string endpoint = 6;
  string runtime_id = 7;
  bool update_required = 8;
  bool ready = 9;
  int64 ready_reported_at = 10;
  string user_role = 11;
}

message ListMachinesRequest {}

message ListMachinesResponse {
  repeated Machine machines = 1;
}

message GetMachineRequest {
  string machine_id = 1;
}

message GetMachineResponse {
  Machine machine = 1;
}

message CreateMachineRequest {
  string name = 1;
  string runtime_id = 2;
}

message CreateMachineResponse {
  Machine machine = 1;
  string machine_token = 2;
}

message UpdateMachineRequest {
  string machine_id = 1;
  string name = 2;
}

message UpdateMachineResponse {
  Machine machine = 1;
}

message StartMachineRequest {
  string machine_id = 1;
  string runtime_id = 2;
}

message StartMachineResponse {
  Machine machine = 1;
}

message StopMachineRequest {
  string machine_id = 1;
}

message StopMachineResponse {
  Machine machine = 1;
}

message DeleteMachineRequest {
  string machine_id = 1;
}

message DeleteMachineResponse {}

message MachineEvent {
  string id = 1;
  string machine_id = 2;
  string job_id = 3;
  string level = 4;
  string event_type = 5;
  string message = 6;
  int64 created_at = 7;
}

message ListMachineEventsRequest {
  string machine_id = 1;
  int32 limit = 2;
}

message ListMachineEventsResponse {
  repeated MachineEvent events = 1;
}
