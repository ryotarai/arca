syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

import "arca/v1/auth.proto";

service UserService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc IssueUserSetupToken(IssueUserSetupTokenRequest) returns (IssueUserSetupTokenResponse);
  rpc CompleteUserSetup(CompleteUserSetupRequest) returns (CompleteUserSetupResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);
  rpc GetUserSettings(GetUserSettingsRequest) returns (GetUserSettingsResponse);
  rpc UpdateUserSettings(UpdateUserSettingsRequest) returns (UpdateUserSettingsResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc ListUserLLMModels(ListUserLLMModelsRequest) returns (ListUserLLMModelsResponse);
  rpc CreateUserLLMModel(CreateUserLLMModelRequest) returns (CreateUserLLMModelResponse);
  rpc UpdateUserLLMModel(UpdateUserLLMModelRequest) returns (UpdateUserLLMModelResponse);
  rpc DeleteUserLLMModel(DeleteUserLLMModelRequest) returns (DeleteUserLLMModelResponse);
  rpc DuplicateUserLLMModel(DuplicateUserLLMModelRequest) returns (DuplicateUserLLMModelResponse);
}

message ManagedUser {
  string id = 1;
  string email = 2;
  bool setup_required = 3;
  int64 setup_token_expires_at = 4;
  int64 created_at = 5;
  string role = 6;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated ManagedUser users = 1;
}

message CreateUserRequest {
  string email = 1;
}

message CreateUserResponse {
  ManagedUser user = 1;
  string setup_token = 2;
  int64 setup_token_expires_at = 3;
}

message IssueUserSetupTokenRequest {
  string user_id = 1;
}

message IssueUserSetupTokenResponse {
  ManagedUser user = 1;
  string setup_token = 2;
  int64 setup_token_expires_at = 3;
}

message CompleteUserSetupRequest {
  string setup_token = 1;
  string password = 2;
}

message CompleteUserSetupResponse {
  User user = 1;
}

message UpdateUserRoleRequest {
  string user_id = 1;
  string role = 2;
}

message UpdateUserRoleResponse {
  ManagedUser user = 1;
}

message UserSettings {
  repeated string ssh_public_keys = 1;
}

message GetUserSettingsRequest {}

message GetUserSettingsResponse {
  UserSettings settings = 1;
}

message UpdateUserSettingsRequest {
  UserSettings settings = 1;
}

message UpdateUserSettingsResponse {
  UserSettings settings = 1;
}

message SearchUsersRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchUsersResponse {
  repeated UserSearchResult users = 1;
}

message UserSearchResult {
  string id = 1;
  string email = 2;
}

message LLMModel {
  string id = 1;
  string config_name = 2;
  string endpoint_type = 3;
  string custom_endpoint = 4;
  string model_name = 5;
  bool has_api_key = 6;
  int32 max_context_tokens = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ListUserLLMModelsRequest {}

message ListUserLLMModelsResponse {
  repeated LLMModel models = 1;
}

message CreateUserLLMModelRequest {
  string config_name = 1;
  string endpoint_type = 2;
  string custom_endpoint = 3;
  string model_name = 4;
  string api_key = 5;
  int32 max_context_tokens = 6;
}

message CreateUserLLMModelResponse {
  LLMModel model = 1;
}

message UpdateUserLLMModelRequest {
  string id = 1;
  string config_name = 2;
  string endpoint_type = 3;
  string custom_endpoint = 4;
  string model_name = 5;
  string api_key = 6;
  int32 max_context_tokens = 7;
}

message UpdateUserLLMModelResponse {
  LLMModel model = 1;
}

message DeleteUserLLMModelRequest {
  string id = 1;
}

message DeleteUserLLMModelResponse {}

message DuplicateUserLLMModelRequest {
  string id = 1;
}

message DuplicateUserLLMModelResponse {
  LLMModel model = 1;
}
