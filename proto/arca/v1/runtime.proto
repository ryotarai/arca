syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service RuntimeService {
  rpc ListRuntimes(ListRuntimesRequest) returns (ListRuntimesResponse);
  rpc ListAvailableRuntimes(ListAvailableRuntimesRequest) returns (ListAvailableRuntimesResponse);
  rpc CreateRuntime(CreateRuntimeRequest) returns (CreateRuntimeResponse);
  rpc UpdateRuntime(UpdateRuntimeRequest) returns (UpdateRuntimeResponse);
  rpc DeleteRuntime(DeleteRuntimeRequest) returns (DeleteRuntimeResponse);
}

enum RuntimeType {
  RUNTIME_TYPE_UNSPECIFIED = 0;
  RUNTIME_TYPE_LIBVIRT = 1;
  RUNTIME_TYPE_GCE = 2;
  RUNTIME_TYPE_LXD = 3;
}

enum MachineExposureMethod {
  MACHINE_EXPOSURE_METHOD_UNSPECIFIED = 0;
  reserved 1;
  MACHINE_EXPOSURE_METHOD_PROXY_VIA_SERVER = 2;
}

enum MachineConnectivity {
  MACHINE_CONNECTIVITY_UNSPECIFIED = 0;
  MACHINE_CONNECTIVITY_PRIVATE_IP = 1;
  MACHINE_CONNECTIVITY_PUBLIC_IP = 2;
}

message MachineExposureConfig {
  MachineExposureMethod method = 1;
  string domain_prefix = 2;
  string base_domain = 3;
  reserved 4, 5, 6;
  MachineConnectivity connectivity = 7;
}

message LibvirtRuntimeConfig {
  string uri = 1;
  string network = 2;
  string storage_pool = 3;
  string startup_script = 4;
}

message GceRuntimeConfig {
  string project = 1;
  string zone = 2;
  string network = 3;
  string subnetwork = 4;
  string service_account_email = 5;
  string startup_script = 6;
  string machine_type = 7;
  int64 disk_size_gb = 8;
  string image_project = 9;
  string image_family = 10;
  repeated string allowed_machine_types = 11;
}

message LxdRuntimeConfig {
  string endpoint = 1;
  string startup_script = 2;
}

message RuntimeConfig {
  oneof provider {
    LibvirtRuntimeConfig libvirt = 1;
    GceRuntimeConfig gce = 2;
    LxdRuntimeConfig lxd = 4;
  }
  MachineExposureConfig exposure = 3;
  string server_api_url = 5;
  int64 auto_stop_timeout_seconds = 6;
}

message Runtime {
  string id = 1;
  string name = 2;
  RuntimeType type = 3;
  RuntimeConfig config = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
}

message ListRuntimesRequest {}

message ListRuntimesResponse {
  repeated Runtime runtimes = 1;
}

message CreateRuntimeRequest {
  string name = 1;
  RuntimeType type = 2;
  RuntimeConfig config = 3;
}

message CreateRuntimeResponse {
  Runtime runtime = 1;
}

message UpdateRuntimeRequest {
  string runtime_id = 1;
  string name = 2;
  RuntimeType type = 3;
  RuntimeConfig config = 4;
}

message UpdateRuntimeResponse {
  Runtime runtime = 1;
}

message DeleteRuntimeRequest {
  string runtime_id = 1;
}

message DeleteRuntimeResponse {}

message RuntimeSummary {
  string id = 1;
  string name = 2;
  RuntimeType type = 3;
}

message ListAvailableRuntimesRequest {}

message ListAvailableRuntimesResponse {
  repeated RuntimeSummary runtimes = 1;
}
