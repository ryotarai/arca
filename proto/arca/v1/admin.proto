syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service AdminService {
  rpc SetAdminViewMode(SetAdminViewModeRequest) returns (SetAdminViewModeResponse);
  rpc GetAdminViewMode(GetAdminViewModeRequest) returns (GetAdminViewModeResponse);
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
  rpc ListServerLLMModels(ListServerLLMModelsRequest) returns (ListServerLLMModelsResponse);
  rpc CreateServerLLMModel(CreateServerLLMModelRequest) returns (CreateServerLLMModelResponse);
  rpc UpdateServerLLMModel(UpdateServerLLMModelRequest) returns (UpdateServerLLMModelResponse);
  rpc DeleteServerLLMModel(DeleteServerLLMModelRequest) returns (DeleteServerLLMModelResponse);
}

message SetAdminViewModeRequest {
  string mode = 1;
}
message SetAdminViewModeResponse {}

message GetAdminViewModeRequest {}
message GetAdminViewModeResponse {
  string mode = 1;
  bool is_admin = 2;
}

message ListAuditLogsRequest {
  int32 limit = 1;
  string action_prefix = 2;
  string actor_email = 3;
  int32 offset = 4;
}

message ListAuditLogsResponse {
  repeated AuditLog audit_logs = 1;
  int32 total_count = 2;
}

message AuditLog {
  string id = 1;
  string actor_email = 2;
  string acting_as_email = 3;
  string action = 4;
  string resource_type = 5;
  string resource_id = 6;
  string details = 7;
  string created_at = 8;
}

message ServerLLMModel {
  string id = 1;
  string config_name = 2;
  string endpoint_type = 3;
  string custom_endpoint = 4;
  string model_name = 5;
  string token_command = 6;
  int32 max_context_tokens = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ListServerLLMModelsRequest {}

message ListServerLLMModelsResponse {
  repeated ServerLLMModel models = 1;
}

message CreateServerLLMModelRequest {
  string config_name = 1;
  string endpoint_type = 2;
  string custom_endpoint = 3;
  string model_name = 4;
  string token_command = 5;
  int32 max_context_tokens = 6;
}

message CreateServerLLMModelResponse {
  ServerLLMModel model = 1;
}

message UpdateServerLLMModelRequest {
  string id = 1;
  string config_name = 2;
  string endpoint_type = 3;
  string custom_endpoint = 4;
  string model_name = 5;
  string token_command = 6;
  int32 max_context_tokens = 7;
}

message UpdateServerLLMModelResponse {
  ServerLLMModel model = 1;
}

message DeleteServerLLMModelRequest {
  string id = 1;
}

message DeleteServerLLMModelResponse {}
