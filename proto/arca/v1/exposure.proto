syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service ExposureService {
  rpc UpsertMachineExposure(UpsertMachineExposureRequest) returns (UpsertMachineExposureResponse);
  rpc ListMachineExposures(ListMachineExposuresRequest) returns (ListMachineExposuresResponse);
  rpc GetMachineExposureByHostname(GetMachineExposureByHostnameRequest) returns (GetMachineExposureByHostnameResponse);
  rpc ReportMachineReadiness(ReportMachineReadinessRequest) returns (ReportMachineReadinessResponse);
  rpc GetMachineLLMModels(GetMachineLLMModelsRequest) returns (GetMachineLLMModelsResponse);
}

message MachineExposure {
  string id = 1;
  string machine_id = 2;
  string name = 3;
  string hostname = 4;
  string service = 5;
  reserved 6, 7, 8; // was public, visibility, selected_user_ids
}

message UpsertMachineExposureRequest {
  string machine_id = 1;
  reserved 2;
  string name = 3;
  reserved 4, 5, 6; // was public, visibility, selected_user_ids
}

message UpsertMachineExposureResponse {
  MachineExposure exposure = 1;
}

message ListMachineExposuresRequest {
  string machine_id = 1;
}

message ListMachineExposuresResponse {
  repeated MachineExposure exposures = 1;
}

message GetMachineExposureByHostnameRequest {
  string hostname = 1;
}

message GetMachineExposureByHostnameResponse {
  MachineExposure exposure = 1;
}

message ReportMachineReadinessRequest {
  bool ready = 1;
  string reason = 2;
  string machine_id = 3;
  string container_id = 4;
  string arcad_version = 5;
}

message ReportMachineReadinessResponse {
  bool accepted = 1;
}

message GetMachineLLMModelsRequest {}

message GetMachineLLMModelsResponse {
  repeated MachineLLMModel models = 1;
}

message MachineLLMModel {
  string config_name = 1;
  string endpoint_type = 2;
  string custom_endpoint = 3;
  string model_name = 4;
  string api_key = 5;
  int32 max_context_tokens = 6;
}
