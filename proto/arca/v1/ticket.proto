syntax = "proto3";

package arca.v1;

option go_package = "github.com/ryotarai/arca/internal/gen/arca/v1;arcav1";

service TicketService {
  rpc IssueTicket(IssueTicketRequest) returns (IssueTicketResponse);
  rpc VerifyTicket(VerifyTicketRequest) returns (VerifyTicketResponse);
  rpc ExchangeArcadSession(ExchangeArcadSessionRequest) returns (ExchangeArcadSessionResponse);
  rpc ValidateArcadSession(ValidateArcadSessionRequest) returns (ValidateArcadSessionResponse);
}

message TicketUser {
  string id = 1;
  string email = 2;
}

message IssueTicketRequest {
  string machine_id = 1;
  string exposure_id = 2;
}

message IssueTicketResponse {
  string ticket = 1;
  int64 expires_at_unix = 2;
}

message VerifyTicketRequest {
  string ticket = 1;
}

message VerifyTicketResponse {
  TicketUser user = 1;
  string machine_id = 2;
  string exposure_id = 3;
}

message ExchangeArcadSessionRequest {
  string token = 1;
  string hostname = 2;
}

message ExchangeArcadSessionResponse {
  string session_id = 1;
  int64 expires_at_unix = 2;
  TicketUser user = 3;
  string machine_id = 4;
  string exposure_id = 5;
}

message ValidateArcadSessionRequest {
  string session_id = 1;
  string hostname = 2;
  string path = 3;
}

message ValidateArcadSessionResponse {
  TicketUser user = 1;
  string machine_id = 2;
  string exposure_id = 3;
}
