interface:
  display_name: "Ideas to Tasks"
  short_description: "Convert tmp/ideas.md into task files"
  default_prompt: "Read tmp/ideas.md, convert unchecked ideas into concrete task specs in tmp/tasks/NNN-TASK_NAME.md, assign NNN from the max across both tmp/tasks/ and tmp/tasks-done/, ask humans concise clarification questions when ideas are too rough, and check only fully clarified and written ideas in tmp/ideas.md."
