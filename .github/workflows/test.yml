name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create stub ui/dist for go:embed
        run: mkdir -p internal/server/ui/dist && touch internal/server/ui/dist/.gitkeep

      - name: Generate sqlc
        run: make sqlc

      - name: Run backend tests
        run: make test/backend

  e2e-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build frontend
        run: make build-frontend

      - name: Generate sqlc
        run: make sqlc

      - name: Install Playwright browsers
        run: npx --prefix web playwright install --with-deps chromium

      - name: Install sqlite3
        run: sudo apt-get install -y sqlite3

      - name: Run E2E tests
        run: make test/e2e
