---
- name: Check if cloudflared exists
  ansible.builtin.stat:
    path: /usr/local/bin/cloudflared
  register: cloudflared_stat

- name: Set architecture mapping
  ansible.builtin.set_fact:
    cloudflared_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Download cloudflared
  ansible.builtin.get_url:
    url: "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-{{ cloudflared_arch }}"
    dest: /usr/local/bin/cloudflared
    mode: "0755"
  when: not cloudflared_stat.stat.exists
