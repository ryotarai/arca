---
- hosts: localhost
  connection: local
  become: yes
  vars:
    daemon_user: "{{ lookup('env', 'ARCA_DAEMON_USER') | default('arcad', true) }}"
    interactive_user: "{{ lookup('env', 'ARCA_INTERACTIVE_USER') | default('arcauser', true) }}"
    authorized_keys_b64: "{{ lookup('env', 'ARCA_INTERACTIVE_AUTHORIZED_KEYS_B64') | default('', true) }}"
    agent_endpoint_url: "{{ lookup('env', 'ARCA_AGENT_ENDPOINT_URL') | default('http://localhost:11030', true) }}"
    shelley_binary_url_base: "{{ lookup('env', 'SHELLEY_BINARY_URL_BASE') | default('', true) }}"
    shelley_base_path: "{{ lookup('env', 'SHELLEY_BASE_PATH') | default('/__arca/shelley', true) }}"
    shelley_port: "{{ lookup('env', 'SHELLEY_PORT') | default('21032', true) }}"
    shelley_db_path: "{{ lookup('env', 'SHELLEY_DB_PATH') | default('/var/lib/arca/shelley/shelley.db', true) }}"
    ttyd_socket: "{{ lookup('env', 'ARCAD_TTYD_SOCKET') | default('/run/arca/ttyd.sock', true) }}"
    ttyd_base_path: "{{ lookup('env', 'TTYD_BASE_PATH') | default('/__arca/ttyd', true) }}"
    startup_sentinel: "{{ lookup('env', 'ARCAD_STARTUP_SENTINEL') | default('/var/lib/arca/startup.done', true) }}"
    user_startup_script: "/usr/local/bin/arca-user-startup.sh"
  roles:
    - directories
    - users
    - packages
    - sudoers
    - workspace
    - shelley
    - { role: env_permissions, tags: ['runtime_only'] }
    - { role: ssh_keys, tags: ['runtime_only'] }
    - { role: user_startup, tags: ['runtime_only'] }
    - { role: agent_guidelines, tags: ['runtime_only'] }
    - { role: systemd_units, tags: ['runtime_only'] }
    - { role: sentinel, tags: ['runtime_only'] }
    - devtools
